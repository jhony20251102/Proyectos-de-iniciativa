<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Soporte TI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <div class="glass-card">
      <div class="header">
        <div class="status-dot"></div>
        <span class="status-text">Soporte TI Certus</span>
      </div>
      <button id="supportBtn" class="pulse-button">
        Solicitar apoyo
      </button>
    </div>
  </div>

  <script>
    let supportURL = '';

    // Sincronización proactiva
    window.electronAPI.onSetUrl((url) => {
      supportURL = url;
    });

    // Carga inicial explícita
    window.electronAPI.getSupportUrl().then(url => {
      supportURL = url;
    });

    document.getElementById('supportBtn').addEventListener('click', async () => {
      // Intentamos obtener la última URL justo antes de abrir
      const latestUrl = await window.electronAPI.getSupportUrl();
      const urlToOpen = latestUrl || supportURL;

      if (urlToOpen) {
        window.electronAPI.openExternal(urlToOpen);
      } else {
        alert("La URL de soporte no ha sido configurada.");
      }
    });
  </script>
</body>

</html>
