<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Preparando Sistema...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f8fafc;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      cursor: wait;
      overflow: hidden;
    }
    
    .spinner {
      width: 80px;
      height: 80px;
      border: 5px solid rgba(59, 130, 246, 0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 40px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: -1px;
      background: linear-gradient(to right, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      text-align: center;
    }
    
    .subtitle {
      font-size: 1.2rem;
      color: #94a3b8;
      text-align: center;
      max-width: 600px;
      line-height: 1.6;
    }
    
    .logo-container {
      position: absolute;
      bottom: 40px;
      opacity: 0.5;
    }
    
    .logo-container img {
      width: 48px;
      height: 48px;
      filter: grayscale(100%);
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <div class="title">Preparando Equipo</div>
  <div class="subtitle">
    ICE Client está preparando el equipo para su protección (Congelamiento).
    <br><br>
    El equipo se reiniciará automáticamente al finalizar este proceso. Por favor, espere.
  </div>
  
  <div class="logo-container">
    <img src="icon.ico" alt="Ice Client" onerror="this.style.display='none'">
  </div>
</body>
</html>
