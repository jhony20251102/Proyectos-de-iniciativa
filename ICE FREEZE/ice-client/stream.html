<!DOCTYPE html>
<html>
<head><title>ICE Stream</title></head>
<body>
<video id="video" autoplay muted style="display:none"></video>
<canvas id="canvas" width="960" height="540" style="display:none"></canvas>
<script>
  const { ipcRenderer } = require('electron');
  
  let captureInterval = null;
  let isSending = false;

  ipcRenderer.on('start-capture', async (event, sourceId) => {
    try {
      
      if (captureInterval) clearInterval(captureInterval);

      const stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: {
          mandatory: {
            chromeMediaSource: 'desktop',
            chromeMediaSourceId: sourceId,
            maxWidth: 960,
            maxHeight: 540,
            maxFrameRate: 2
          }
        }
      });

      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      
      video.srcObject = stream;
      
      video.onloadedmetadata = () => {
        video.play();
        
        
        captureInterval = setInterval(() => {
          if (isSending) return; 
          isSending = true;
          
          ctx.drawImage(video, 0, 0, 960, 540);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.35);
          ipcRenderer.send('stream-frame-captured', dataUrl);
          
          isSending = false;
        }, 1000);
      };
      
    } catch (e) {
      console.error('Error al iniciar captura de pantalla:', e);
      ipcRenderer.send('stream-capture-error', e.message);
    }
  });

  ipcRenderer.on('stop-capture', () => {
    if (captureInterval) {
      clearInterval(captureInterval);
      captureInterval = null;
    }
    const video = document.getElementById('video');
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
      video.srcObject = null;
    }
  });
</script>
</body>
</html>
