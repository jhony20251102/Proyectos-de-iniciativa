<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ice Client - Panel Avanzado</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --frozen-color: #38bdf8;
      --frozen-bg: rgba(56, 189, 248, 0.1);
      --thawed-color: #f59e0b;
      --thawed-bg: rgba(245, 158, 11, 0.1);
      --success: #10b981;
      --danger: #ef4444;
      --border-color: rgba(255, 255, 255, 0.1);
    }
    
    * { box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      box-sizing: border-box;
      user-select: none;
      overflow: hidden;
    }
    
    .header {
      width: 100%;
      padding: 30px 0 20px;
      text-align: center;
      background: linear-gradient(to bottom, rgba(15,23,42,0.9), transparent);
    }
    
    .header img {
      width: 70px;
      height: 70px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      padding: 8px;
      margin-bottom: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      border: 1px solid var(--border-color);
      transition: transform 0.3s ease;
    }
    .header img:hover {
      transform: scale(1.05);
    }
    
    .header h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .header p {
      margin: 6px 0 0 0;
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .container {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      width: 85%;
      max-width: 360px;
      margin-top: 10px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
      padding: 30px 25px;
      text-align: center;
      border: 1px solid var(--border-color);
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hidden { display: none !important; }
    #login-view, #control-view { width: 100%; }

        .login-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    input[type="password"] {
      padding: 14px;
      width: calc(100% - 30px);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.2);
      color: white;
      margin-bottom: 20px;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
      text-align: center;
      letter-spacing: 2px;
    }
    input[type="password"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
      background: rgba(0,0,0,0.4);
    }
    input[type="password"]::placeholder {
      letter-spacing: normal;
      color: rgba(255,255,255,0.4);
    }

    button {
      padding: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, #2563eb 100%);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
      font-size: 1rem;
      transition: all 0.2s ease;
      margin-bottom: 12px;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    button:hover { 
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
    }
    button:active {
      transform: translateY(0);
    }
    
    button.danger { 
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
    button.danger:hover {
      box-shadow: 0 6px 16px rgba(239, 68, 68, 0.4);
    }
    
    button.action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    #error-msg { 
      color: #fca5a5; 
      font-size: 0.85em; 
      margin-bottom: 15px; 
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 10px;
      border-radius: 8px;
      animation: shake 0.4s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

        .status-banner {
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 25px;
      font-weight: 700;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.3s ease;
    }

    .frozen-banner {
      background-color: var(--frozen-bg);
      color: var(--frozen-color);
      border: 1px solid rgba(56, 189, 248, 0.3);
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
    }
    
    .thawed-banner {
      background-color: var(--thawed-bg);
      color: var(--thawed-color);
      border: 1px solid rgba(245, 158, 11, 0.3);
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.1);
    }

    .connection-status {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(0,0,0,0.2);
      padding: 8px 15px;
      border-radius: 20px;
      display: inline-flex;
    }
    
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 8px currentColor;
    }
    .dot.online { background-color: var(--success); color: var(--success); }
    .dot.offline { background-color: var(--danger); color: var(--danger); }

    .separator {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      margin: 25px 0;
    }

  </style>
</head>
<body>

  <div class="header">
    <img src="icon.ico" alt="Logo" id="header-logo" onerror="this.style.display='none'">
    <h1>Ice Client Console</h1>
  </div>

  <div class="container">
    <!-- Login View --> 
    <div id="login-view">
      <div class="login-title">Autenticación Local</div>
      <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0; margin-bottom: 25px; line-height: 1.4;">
        Consola de administración protegida. Acceso exclusivo para el personal de TI.
      </p>
      
      <div id="error-msg" class="hidden">Contraseña incorrecta</div>
      <input type="password" id="password" placeholder="••••••••" autocomplete="off" />
      <button id="btn-login">Verificar Identidad</button>
    </div>

    <!-- Control View -->
    <div id="control-view" class="hidden">
      
      <div id="status-banner" class="status-banner thawed-banner">
        <span id="freeze-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </span> 
        <span id="freeze-status">Descongelado</span>
      </div>

      <div class="connection-status">
        <span id="server-dot" class="dot offline"></span>
        <span id="server-status">Desconectado de la nube</span>
      </div>

      <div class="separator"></div>
      
      <button id="btn-freeze" class="action-btn hidden">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5l-5 5-5-5M22 12H2M19 17l-7-5-7 5"/></svg>
        Ice Freeze PC
      </button>
      <button id="btn-thaw" class="danger action-btn hidden">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"/></svg>
        Descongelar PC
      </button>

      <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 25px; line-height: 1.4;">
        Al modificar el estado de protección, el equipo se reiniciará automáticamente.
      </p>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const loginView = document.getElementById('login-view');
    const controlView = document.getElementById('control-view');
    const pwdInput = document.getElementById('password');
    const btnLogin = document.getElementById('btn-login');
    const errorMsg = document.getElementById('error-msg');
    
    const serverStatus = document.getElementById('server-status');
    const serverDot = document.getElementById('server-dot');
    
    const freezeStatus = document.getElementById('freeze-status');
    const statusBanner = document.getElementById('status-banner');
    const freezeIcon = document.getElementById('freeze-icon');

    const btnFreeze = document.getElementById('btn-freeze');
    const btnThaw = document.getElementById('btn-thaw');

    ipcRenderer.invoke('get-initial-state').then(state => {
      updateStatus(state.status);
      updateFreezeState(state.isFrozen);
    });

    btnLogin.addEventListener('click', () => {
      ipcRenderer.send('verify-password', pwdInput.value);
    });

    pwdInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        ipcRenderer.send('verify-password', pwdInput.value);
      }
    });

    ipcRenderer.on('password-result', (event, result) => {
      if (result.success) {
        loginView.classList.add('hidden');
        controlView.classList.remove('hidden');
        pwdInput.value = ''; 
      } else {
        errorMsg.classList.remove('hidden');
        pwdInput.style.borderColor = '#ef4444';
        setTimeout(() => pwdInput.style.borderColor = '', 1000);
      }
    });

    btnFreeze.addEventListener('click', () => {
      ipcRenderer.send('set-freeze-state', true);
    });

    btnThaw.addEventListener('click', () => {
      ipcRenderer.send('set-freeze-state', false);
    });

    ipcRenderer.on('frozen_state', (event, isFrozen) => {
      updateFreezeState(isFrozen);
    });

    ipcRenderer.on('uwf_error', (event, errMsg) => {
      alert('Ups! Hubo un problema al ejecutar el comando:\n\n' + errMsg);
    });

    ipcRenderer.on('status', (event, status) => {
      updateStatus(status);
    });

    function updateFreezeState(isFrozen) {
      if (isFrozen) {
        freezeStatus.textContent = 'Congelado';
        statusBanner.className = 'status-banner frozen-banner';
        freezeIcon.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5l-5 5-5-5M22 12H2M19 17l-7-5-7 5"/></svg>';
      } else {
        freezeStatus.textContent = 'Descongelado';
        statusBanner.className = 'status-banner thawed-banner';
        freezeIcon.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
      }
    }

    function updateStatus(status) {
      if (status === 'online') {
        serverStatus.textContent = 'Conectado a la nube';
        serverDot.className = 'dot online';
      } else {
        serverStatus.textContent = 'Desconectado de la nube';
        serverDot.className = 'dot offline';
      }
    }
    
    
    
    
    let peerConnection = null;
    let localStream = null;
    
    const configuration = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' }
      ]
    };

    ipcRenderer.on('start_webrtc', async (event, data) => {
      try {
        const { sourceId, offer, requesterId } = data;
        
        
        localStream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            mandatory: {
              chromeMediaSource: 'desktop',
              chromeMediaSourceId: sourceId,
              minFrameRate: 15,
              maxFrameRate: 30
            }
          }
        });

        
        peerConnection = new RTCPeerConnection(configuration);

        
        localStream.getTracks().forEach(track => {
          peerConnection.addTrack(track, localStream);
        });

        
        peerConnection.onicecandidate = (e) => {
          if (e.candidate) {
            ipcRenderer.send('webrtc_ice_candidate', {
              candidate: e.candidate.toJSON()
            });
          }
        };

        
        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
        
        
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);

        
        ipcRenderer.send('webrtc_answer', {
          answer: answer
        });

      } catch (err) {
        console.error('Error al iniciar WebRTC:', err);
      }
    });

    ipcRenderer.on('webrtc_ice_candidate', async (event, data) => {
      try {
        if (peerConnection && data.candidate) {
          await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
        }
      } catch (e) {
        console.error('Error agregando ICE candidate:', e);
      }
    });

    ipcRenderer.on('stop_webrtc', () => {
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }
    });
  </script>
</body>
</html>
